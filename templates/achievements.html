<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Достижения 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h1 class="mb-5">🏆 Доска Почета 7Б</h1>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for ach in achievements %}
            <div class="col">
                <div class="card h-100 shadow border-warning">
                    <div class="card-body">
                        <div style="font-size: 4rem;">{{ ach.icon }}</div>
                        <h4 class="card-title">{{ ach.title }}</h4>
                        <p class="text-muted">Герой: @{{ ach.user_login }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        <a href="/" class="btn btn-primary mt-5">🏠 Домой</a>
    </div>
</body>
</html>
