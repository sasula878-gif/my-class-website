<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Галерея 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 Назад на главную</a>
        {% if role == 'admin' %}
        <a href="/add_photo" class="btn btn-outline-light btn-sm">+ Добавить фото</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    <h2 class="mb-4 text-center">📸 Наша Галерея</h2>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for photo in photos %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <img src="{{ photo.url }}" class="card-img-top" alt="{{ photo.title }}">
                <div class="card-body">
                    <p class="card-text text-center fw-bold">{{ photo.title }}</p>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-center w-100">В галерее пока пусто.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
