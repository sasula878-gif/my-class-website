<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Галерея класса</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>🖼️ Галерея класса</h1>
        <div>
            {% if user == 'admin' %}
                <a href="/add_photo" class="btn btn-success me-2">+ Добавить фото</a>
            {% endif %}
            <a href="/" class="btn btn-outline-secondary">Назад</a>
        </div>
    </div>
    <hr>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for photo in photos %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <img src="{{ photo['url'] }}" class="card-img-top" alt="{{ photo['title'] }}" style="object-fit: cover; height: 200px;">
                <div class="card-body text-center">
                    <p class="card-text">{{ photo['title'] }}</p>
                </div>
            </div>
        </div>
        {% else %}
            <p class="text-center w-100">Фотографий пока нет.</p>
        {% endfor %}
    </div>
</body>
</html>
