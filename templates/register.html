<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; min-height: 100vh; }
        .reg-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin: auto; }
    </style>
</head>
<body>
    <div class="reg-card">
        <h2 class="text-center text-primary mb-4">🚀 Стань частью 7Б</h2>
        <form method="post">
            <div class="mb-3"><label>ФИО полностью:</label><input name="fio" class="form-control" placeholder="Иванов Иван Иванович" required></div>
            <div class="mb-3"><label>Дата рождения:</label><input name="bday" type="date" class="form-control" required></div>
            <div class="mb-3"><label>Почта:</label><input name="email" type="email" class="form-control" placeholder="example@mail.ru" required></div>
            <div class="row">
                <div class="col"><div class="mb-3"><label>Логин:</label><input name="login" class="form-control" required></div></div>
                <div class="col"><div class="mb-3"><label>Пароль:</label><input name="password" type="password" class="form-control" required></div></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Зарегистрироваться</button>
        </form>
        <p class="text-center mt-3"><a href="/login">Уже есть аккаунт? Войти</a></p>
    </div>
</body>
</html>
