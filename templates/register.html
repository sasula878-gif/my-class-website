<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 shadow-sm" style="width: 100%; max-width: 450px;">
            <h2 class="text-center text-primary mb-4">📝 Регистрация</h2>
            <form method="post">
                <div class="mb-3">
                    <label>ФИО полностью:</label>
                    <input name="fio" class="form-control" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="mb-3">
                    <label>Дата рождения:</label>
                    <input name="bday" type="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Твоя почта:</label>
                    <input name="email" type="email" class="form-control" placeholder="mail@example.com" required>
                </div>
                <div class="mb-3">
                    <label>Логин:</label>
                    <input name="login" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Пароль:</label>
                    <input name="password" type="password" class="form-control" required>
                </div>
                <div class="mb-3 text-danger">
                    <label>Код приглашения:</label>
                    <input name="invite" class="form-control border-danger" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Создать аккаунт</button>
            </form>
            <p class="mt-3 text-center"><a href="/login">Уже зарегистрированы? Войти</a></p>
        </div>
    </div>
</body>
</html>
