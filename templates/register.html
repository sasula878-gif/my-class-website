<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow mx-auto" style="max-width: 400px; border-radius: 15px;">
        <h3 class="text-center text-primary mb-4">Регистрация</h3>
        <form method="post" action="/register">
            <div class="mb-3">
                <label>ФИО полностью:</label>
                <input name="fio" class="form-control" required>
            </div>
            <div class="mb-2">
                <label>Логин:</label>
                <input name="login" class="form-control" required>
            </div>
            <div class="mb-2">
                <label>Пароль:</label>
                <input name="password" type="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Дата рождения:</label>
                <input name="bday" type="date" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Создать аккаунт</button>
        </form>
        <p class="text-center mt-3"><a href="/login">Уже есть аккаунт? Войти</a></p>
    </div>
</body>
</html>
