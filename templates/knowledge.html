<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База знаний</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📚 База знаний</h1>
        <div>
            {% if user == 'admin' %}
                <a href="/add_material" class="btn btn-success me-2">+ Добавить материал</a>
            {% endif %}
            <a href="/" class="btn btn-outline-secondary">Назад</a>
        </div>
    </div>
    <hr>
    <div class="row">
        {% for item in materials %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-light text-muted small">{{ item['category'] }}</div>
                <div class="card-body">
                    <h5 class="card-title">{{ item['title'] }}</h5>
                    <a href="{{ item['url'] }}" class="btn btn-sm btn-primary" target="_blank">Перейти к материалу</a>
                </div>
            </div>
        </div>
        {% else %}
            <p>Здесь пока пусто. Начни добавлять учебники или ГДЗ!</p>
        {% endfor %}
    </div>
</body>
</html>
