<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База знаний 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-success mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 Назад на главную</a>
        {% if role == 'admin' %}
        <a href="/add_material" class="btn btn-outline-light btn-sm">+ Добавить материал</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">📚 База знаний</h2>
    <div class="list-group shadow-sm">
        {% for item in materials %}
        <div class="list-group-item">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1 text-primary">{{ item.title }}</h5>
                <span class="badge bg-secondary">{{ item.category }}</span>
            </div>
            <a href="{{ item.url }}" target="_blank" class="btn btn-sm btn-link p-0">Открыть ссылку →</a>
        </div>
        {% else %}
        <p class="text-muted">Материалов пока нет.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
