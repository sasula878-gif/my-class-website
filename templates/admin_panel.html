<div style="max-width: 900px; margin: 20px auto; font-family: 'Segoe UI', sans-serif; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #0d6efd; margin-bottom: 10px;">⚙ Управление 7Б Классом</h2>
    <p style="text-align: center;"><a href="/" style="text-decoration: none; color: #6c757d;">← Вернуться на главную</a></p>
    <hr>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="border: 2px solid #e9ecef; padding: 15px; border-radius: 15px; background: #f8f9fa;">
            <h4 style="color: #0d6efd;">📢 Опубликовать новость</h4>
            <form method="post">
                <input type="hidden" name="action" value="add_post">
                <input name="t" placeholder="Заголовок новости" style="width:100%; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ddd;" required>
                <textarea name="c" placeholder="Текст сообщения..." style="width:100%; height: 80px; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ddd;"></textarea>
                <button type="submit" style="width:100%; background: #0d6efd; color:white; border:none; padding:10px; border-radius: 8px; cursor: pointer;">Выпустить пост</button>
            </form>
        </div>

        <div style="border: 2px solid #fee2e2; padding: 15px; border-radius: 15px; background: #fff5f5;">
            <h4 style="color: #dc3545;">📝 Новое домашнее задание</h4>
            <form method="post">
                <input type="hidden" name="action" value="add_hw">
                <input name="s" placeholder="Предмет" style="width:100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd;" required>
                <input name="t" placeholder="Что задали?" style="width:100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd;" required>
                <input name="d" type="date" style="width:100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd;">
                <button type="submit" style="width:100%; background: #dc3545; color:white; border:none; padding:10px; border-radius: 8px;">Добавить задание</button>
            </form>
        </div>

        <div style="border: 2px solid #d1fae5; padding: 15px; border-radius: 15px; background: #f0fdf4;">
            <h4 style="color: #198754;">⏰ Расписание уроков</h4>
            <form method="post">
                <input type="hidden" name="action" value="edit_sched">
                {% for i in range(1, 7) %}
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <span style="padding-top: 5px;">{{i}}.</span>
                    <input name="sub" placeholder="Предмет" style="width: 50%; padding: 5px;"> 
                    <input name="time" placeholder="08:30" style="width: 40%; padding: 5px;">
                </div>
                {% endfor %}
                <button type="submit" style="width:100%; background: #198754; color:white; border:none; padding:10px; border-radius: 8px; margin-top: 5px;">Обновить все уроки</button>
            </form>
        </div>

        <div style="border: 2px solid #e0f2fe; padding: 15px; border-radius: 15px; background: #f0f9ff;">
            <h4 style="color: #0ea5e9;">📖 База Знаний / ГДЗ</h4>
            <form method="post">
                <input type="hidden" name="action" value="add_kb">
                <input name="s" placeholder="Предмет" style="width:100%; margin-bottom: 5px; padding: 5px;">
                <input name="t" placeholder="Тема (например, Решебник)" style="width:100%; margin-bottom: 5px; padding: 5px;">
                <input name="u" placeholder="Ссылка на файл/сайт" style="width:100%; margin-bottom: 5px; padding: 5px;">
                <button type="submit" style="width:100%; background: #0ea5e9; color:white; border:none; padding:10px; border-radius: 8px;">Добавить в ГДЗ</button>
            </form>
        </div>
    </div>
</div>
