<div style="max-width: 500px; margin: 50px auto; font-family: sans-serif;">
    <h2>⚙️ Добавить информацию</h2>
    <a href="/">← Назад</a><hr>
    
    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <h3>📝 Новое ДЗ</h3>
        <form method="post">
            <input type="hidden" name="action" value="add_hw">
            Предмет: <input name="s" required style="width:100%"><br><br>
            Задание: <input name="t" required style="width:100%"><br><br>
            Дата: <input name="d" type="date" style="width:100%"><br><br>
            <button type="submit" style="width:100%; background: red; color:white; border:none; padding:10px;">Добавить ДЗ</button>
        </form>
    </div>

    <div style="background: #e9ecef; padding: 20px; border-radius: 10px;">
        <h3>📢 Новая новость</h3>
        <form method="post">
            <input type="hidden" name="action" value="add_post">
            Заголовок: <input name="t" required style="width:100%"><br><br>
            Текст: <textarea name="c" style="width:100%"></textarea><br><br>
            <button type="submit" style="width:100%; background: blue; color:white; border:none; padding:10px;">Опубликовать</button>
        </form>
    </div>
</div>
