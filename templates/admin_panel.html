<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
    <div class="container">
        <h1 class="text-danger mb-4">⚙️ Панель управления</h1>
        <a href="/" class="btn btn-secondary mb-4">← Назад на сайт</a>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-3 shadow-sm">
                    <h3>⏰ Часы и Уроки</h3>
                    <form method="post">
                        <input type="hidden" name="action" value="edit_sched">
                        {% for i in range(1, 7) %}
                        <div class="input-group mb-2">
                            <span class="input-group-text">{{i}}</span>
                            <input name="sub" class="form-control" placeholder="Предмет">
                            <input name="time" class="form-control" placeholder="08:30-09:15">
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-success w-100">Сохранить часы</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-3 shadow-sm">
                    <h3>📚 Выдать ДЗ</h3>
                    <form method="post">
                        <input type="hidden" name="action" value="add_hw">
                        <input name="s" class="form-control mb-2" placeholder="Предмет" required>
                        <input name="t" class="form-control mb-2" placeholder="Задание" required>
                        <input name="d" type="date" class="form-control mb-2" required>
                        <button type="submit" class="btn btn-danger w-100">Опубликовать ДЗ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
