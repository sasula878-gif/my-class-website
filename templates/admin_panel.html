<div style="max-width: 600px; margin: 20px auto; font-family: sans-serif;">
    <h1>⚙️ Панель управления 7Б</h1>
    
    <div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px;">
        <h3>Добавить ДЗ</h3>
        <form method="post">
            <input type="hidden" name="action" value="add_hw">
            Предмет: <input name="subject" required><br>
            Задание: <input name="task" required><br>
            Дата: <input name="deadline" type="date"><br>
            <button type="submit">Добавить</button>
        </form>
    </div>

    <div style="border: 1px solid #ccc; padding: 15px;">
        <h3>Новое объявление на стену</h3>
        <form method="post">
            <input type="hidden" name="action" value="add_post">
            Заголовок: <input name="title" required><br>
            Текст: <textarea name="content"></textarea><br>
            <button type="submit">Опубликовать</button>
        </form>
    </div>
    
    <p><a href="/">🏠 На главную</a></p>
</div>
