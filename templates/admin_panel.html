<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <h1 class="mb-4">⚙️ Управление порталом</h1>
        <a href="/" class="btn btn-secondary mb-4">← На сайт</a>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3>⏰ Настройка расписания</h3>
                    <form method="post">
                        <input type="hidden" name="action" value="edit_sched">
                        {% for i in range(1, 7) %}
                        <div class="input-group mb-2">
                            <span class="input-group-text">{{i}}</span>
                            <input name="sub" class="form-control" placeholder="Предмет">
                            <input name="time" class="form-control" placeholder="08:30-09:15">
                        </div>
                        {% endfor %}
                        <button class="btn btn-success w-100">Обновить всё</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 mb-4">
                    <h3>📚 Добавить ДЗ</h3>
                    <form method="post">
                        <input type="hidden" name="action" value="add_hw">
                        <input name="s" class="form-control mb-2" placeholder="Предмет" required>
                        <input name="t" class="form-control mb-2" placeholder="Что задали" required>
                        <input name="d" type="date" class="form-control mb-2" required>
                        <button class="btn btn-danger w-100">Выдать задание</button>
                    </form>
                </div>
                <div class="card p-4">
                    <h3>🏆 Вручить ачивку</h3>
                    <form method="post">
                        <input type="hidden" name="action" value="add_ach">
                        <input name="l" class="form-control mb-2" placeholder="Логин ученика" required>
                        <input name="t" class="form-control mb-2" placeholder="Название (Лучший кодер)" required>
                        <input name="i" class="form-control mb-2" placeholder="Эмодзи (💻)" required>
                        <button class="btn btn-warning w-100">Наградить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
