<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать расписание</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h2>Редактор расписания</h2>
    <form method="POST">
        {% for i in range(1, 8) %}
        <div class="row mb-2">
            <div class="col-1 text-center mt-2"><b>{{ i }}</b></div>
            <div class="col-3"><input type="text" name="time" class="form-control" placeholder="08:30 - 09:15"></div>
            <div class="col-8"><input type="text" name="subject" class="form-control" placeholder="Предмет"></div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-success mt-3">Сохранить всё</button>
        <a href="/" class="btn btn-secondary mt-3">Назад</a>
    </form>
</body>
</html>
