<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | 7Б</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow-sm mx-auto" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <h2 class="text-center text-primary fw-bold mb-4">Наш Класс</h2>
        <form method="post">
            <div class="mb-3">
                <label>Логин (ФамилияИО):</label>
                <input name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Пароль:</label>
                <input name="password" type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Войти</button>
        </form>
        <hr>
        <div class="text-center">
            <p class="mb-1">Впервые здесь?</p>
            <a href="/register" class="btn btn-outline-success btn-sm">Создать аккаунт с ФИО и ДР</a>
        </div>
        <p class="text-center mt-3 small text-muted">© 2026 Сайт 7Б класса. Создано Сашей.</p>
    </div>
</body>
</html>
