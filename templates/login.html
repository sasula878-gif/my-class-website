<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - 7Б Класс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .registration-box {
            background-color: #e7f1ff;
            border: 1px dashed #0d6efd;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">Наш Класс</h2>
        <p class="text-muted">Введите данные для входа</p>
    </div>

    <form method="POST">
        <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Логин (ФамилияИО)</label>
            <input type="text" name="username" id="username" class="form-control" 
                   placeholder="Например: НиколаевскийАА" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Пароль</label>
            <input type="password" name="password" id="password" class="form-control" 
                   placeholder="Если уже есть аккаунт">
        </div>

        <div class="registration-box p-3 mb-4">
            <label for="invite_code" class="form-label small fw-bold text-primary">
                ✨ Впервые здесь? Введи код класса:
            </label>
            <input type="text" name="invite_code" id="invite_code" class="form-control form-control-sm" 
                   placeholder="Код, который дал Антон">
            <div class="form-text mt-1" style="font-size: 0.75rem;">
                Система сама создаст аккаунт и покажет пароль.
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            Войти / Получить пароль
        </button>
    </form>

    <div class="mt-4 text-center">
        <p class="small text-muted">&copy; 2026 Сайт 7Б класса. Создано Антоном.</p>
    </div>
</div>

</body>
</html>
