<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить в базу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h1>Добавить материал</h1>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Категория (например: Математика, ГДЗ, Учебники)</label>
            <input type="text" name="category" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Название материала</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">URL-ссылка</label>
            <input type="url" name="url" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Добавить</button>
        <a href="/knowledge" class="btn btn-link">Отмена</a>
    </form>
</body>
</html>
