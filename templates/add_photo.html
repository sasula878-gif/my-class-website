<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить фото</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h1>Добавить новое фото</h1>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Название/Описание</label>
            <input type="text" name="title" class="form-control" placeholder="Например: Наш поход в музей" required>
        </div>
        <div class="mb-3">
            <label class="form-label">URL-ссылка на изображение</label>
            <input type="url" name="url" class="form-control" placeholder="https://example.com/image.jpg" required>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/gallery" class="btn btn-link">Отмена</a>
    </form>
</body>
</html>
